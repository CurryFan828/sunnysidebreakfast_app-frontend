<div class="login-container">
  <h2>Login</h2>

  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <input type="text" placeholder="Name" [(ngModel)]="name" name="name" required />
    <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required />
    <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required />

    <button type="submit" [disabled]="!loginForm.form.valid">Login</button>
    <button type="button" class="guest-btn" (click)="continueAsGuest()">Continue as Guest</button>
  </form>
  
  <p class="small-text">Don't have an account? Sign up coming soon!</p>
</div>
