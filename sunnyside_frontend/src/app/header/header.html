<header>
  <div class="container">
    <img src="/assets/foods/logo.png" alt="My Logo" routerLink="/" class="logo" />
    <nav>
      <ul>
        <li>
          <a routerLink="/">Home</a>
          <a routerLink="menu-page">Menu</a>

          <!-- If logged in, show Profile link -->
          <a *ngIf="isLoggedIn" routerLink="profile" class="profile-link">Profile</a>

          <!-- If NOT logged in, show Login and Continue as Guest -->
          <ng-container *ngIf="!isLoggedIn">
            <a routerLink="login" class="login-link">Login</a>
            <!-- <button class="guest-btn" (click)="continueAsGuest()">Continue as Guest</button> -->
          </ng-container>

          <!-- Profile Page -->
          <a routerLink="profile">
            <span class="material-icons">account_box</span>    
          </a>

          <!-- Wrap cart link and badge inside a span -->
          <span class="cart-wrapper" style="position: relative; display: inline-block;">
            <a routerLink="cart-page" class="cart-link">
              <span class="material-icons">shopping_cart</span>
              <span *ngIf="cartCount > 0" class="cart-badge">{{ cartCount }}</span>
            </a>
          </span>

        </li>
      </ul>
    </nav>
  </div>
</header>
