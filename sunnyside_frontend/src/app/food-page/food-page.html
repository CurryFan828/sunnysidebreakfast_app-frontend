<div *ngIf="food" class="page-wrapper">
  <div class="container">

    <!-- Back button (TOP LEFT OF CARD) -->
    <a (click)="goBack()" class="back-btn">
      Back to Menu
    </a>

    <!-- Favorite icon (TOP RIGHT OF CARD) -->
    <span 
      class="favorite {{ food.favorite ? '' : 'not' }}" 
      (click)="toggleFavorite()">
      ❤
    </span>

    <div class="image-wrapper">
      <img [src]="food.imageUrl" [alt]="food.name" class="food-image" />
    </div>

    <div class="details">
      <div class="info-block">

        <span class="name">{{ food.name }}</span>

        <div class="cook-time">
          Time to cook is about <strong>{{ food.cookTime }}</strong> minutes
        </div>

        <div class="description">
          <p>{{food.description}}</p>
        </div>

        <div class="price-and-button">
          <div class="price">
            <span>{{ food.price | currency }}</span>
          </div>

          <button (click)="addToCart()" class="add-cart-btn">
            Add to Cart
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
